<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Playground — Arbiter</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/arbiter.css" />
  <script src="/static/arbiter.js"></script>
  <style>
    .pg-layout { display: grid; grid-template-columns: 280px 1fr; gap: 20px; height: calc(100vh - 120px); }
    .pg-sidebar { display: flex; flex-direction: column; gap: 12px; overflow-y: auto; }
    .pg-chat   { display: flex; flex-direction: column; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }

    /* Config panel */
    .config-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 14px; }
    .config-card h4 { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing:.05em; color: var(--text-3); margin: 0 0 10px; }
    .config-row { margin-bottom: 10px; }
    .config-row label { font-size: 11px; color: var(--text-3); display: block; margin-bottom: 4px; }
    .config-row select, .config-row input[type=number], .config-row input[type=range] {
      width: 100%; font-size: 12px; padding: 5px 8px; border-radius: 6px;
      border: 1px solid var(--border); background: var(--surface-2); color: var(--text);
      outline: none;
    }
    .config-row select:focus, .config-row input:focus { border-color: var(--accent); }
    .temp-row { display: flex; align-items: center; gap: 8px; }
    .temp-row input[type=range] { flex: 1; padding: 0; }
    .temp-val { font-size: 12px; font-family: 'JetBrains Mono'; color: var(--accent); min-width: 30px; }

    /* Endpoint info */
    .ep-badge { display: inline-flex; align-items: center; gap: 5px; padding: 3px 8px; border-radius: 10px; font-size: 10px; font-weight: 600; }
    .ep-badge.cfworker  { background: rgba(244,129,32,.12); color: #f48120; }
    .ep-badge.modal     { background: rgba(58,163,242,.12); color: #3aa3f2; }
    .ep-badge.gateway   { background: rgba(46,204,113,.12); color: #2ecc71; }
    .ep-badge.direct    { background: rgba(188,40,237,.12); color: #bc28ed; }
    .ep-url { font-size: 10px; font-family: 'JetBrains Mono'; color: var(--text-3); word-break: break-all; margin-top: 4px; }

    /* Chat messages */
    .chat-messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
    .chat-msg { display: flex; gap: 10px; animation: fadeIn .2s ease; }
    @keyframes fadeIn { from{opacity:0;transform:translateY(4px)} to{opacity:1;transform:none} }
    .chat-msg.user { flex-direction: row-reverse; }
    .msg-bubble {
      max-width: 80%; padding: 10px 14px; border-radius: 12px; font-size: 13px; line-height: 1.6;
      white-space: pre-wrap; word-break: break-word;
    }
    .chat-msg.user .msg-bubble { background: var(--accent); color: #fff; border-radius: 12px 12px 2px 12px; }
    .chat-msg.assistant .msg-bubble { background: var(--surface-2); color: var(--text); border-radius: 12px 12px 12px 2px; }
    .chat-msg.system .msg-bubble { background: rgba(240,185,11,.08); color: var(--text-3); font-size: 11px; border-radius: 8px; font-style: italic; }
    .msg-meta { font-size: 10px; color: var(--text-3); margin-top: 3px; text-align: right; }
    .chat-msg.user .msg-meta { text-align: left; }
    .msg-avatar { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; flex-shrink: 0; margin-top: 2px; }
    .msg-avatar.user-av { background: var(--accent); color: #fff; }
    .msg-avatar.ai-av { background: var(--surface-3); }

    /* Input bar */
    .chat-input-bar { padding: 12px; border-top: 1px solid var(--border); display: flex; gap: 8px; align-items: flex-end; flex-shrink: 0; }
    .chat-input-bar textarea {
      flex: 1; resize: none; min-height: 40px; max-height: 140px; padding: 8px 12px;
      border-radius: 8px; border: 1px solid var(--border); background: var(--surface-2);
      color: var(--text); font-size: 13px; font-family: inherit; outline: none;
      line-height: 1.5; overflow-y: auto;
    }
    .chat-input-bar textarea:focus { border-color: var(--accent); }
    .send-btn {
      padding: 10px 16px; background: var(--accent); color: #fff; border: none;
      border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 600;
      display: flex; align-items: center; gap: 6px; height: 40px; flex-shrink: 0;
    }
    .send-btn:hover { opacity: .9; }
    .send-btn:disabled { opacity: .4; cursor: not-allowed; }

    /* Thinking indicator */
    .thinking-dots span { display: inline-block; width: 5px; height: 5px; border-radius: 50%; background: var(--accent); margin: 0 2px; animation: dot 1.2s ease-in-out infinite; }
    .thinking-dots span:nth-child(2) { animation-delay: .2s; }
    .thinking-dots span:nth-child(3) { animation-delay: .4s; }
    @keyframes dot { 0%,80%,100%{transform:scale(0)} 40%{transform:scale(1)} }

    /* Latency badge */
    .latency-badge { display: inline-block; padding: 1px 6px; border-radius: 6px; font-size: 10px; font-family: 'JetBrains Mono'; background: var(--surface-3); color: var(--text-3); margin-left: 6px; }

    /* Empty state */
    .chat-empty { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; color: var(--text-3); padding: 32px; text-align: center; }
    .chat-empty svg { opacity: .3; }
    .chat-empty p { font-size: 13px; margin: 0; }
    .chat-empty small { font-size: 11px; }
  </style>
</head>
<body>

        <svg class="nav-item-ext" width="11" height="11" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6M15 3h6v6M10 14L21 3"/></svg>

<script>
'use strict';
// ── State ─────────────────────────────────────────────────────────────────────
var _messages = [];         // {role, content}
var _endpoints = [];        // {id, label, type, url, model, vendor, note}
var _sending   = false;

// ── Endpoint loading ──────────────────────────────────────────────────────────
async function loadEndpoints() {
  _endpoints = [];
  var sel = document.getElementById('ep-select');
  sel.innerHTML = '';

  try {
    // 1. Gateway providers (active only)
    var r = await fetch('/api/providers', {cache:'no-store'});
    var providers = await r.json();
    var activeProviders = providers.filter(function(p) { return p.configured && !p.disabled; });
    if (activeProviders.length) {
      var og = document.createElement('optgroup');
      og.label = 'Gateway Providers';
      activeProviders.forEach(function(p) {
        var id = 'gateway:' + p.name;
        _endpoints.push({
          id: id, label: p.label, type: 'gateway',
          vendor: p.name, model: (p.models||[])[0] || '',
          note: p.key_count + ' key(s)',
        });
        var opt = document.createElement('option');
        opt.value = id; opt.textContent = p.label;
        og.appendChild(opt);
      });
      sel.appendChild(og);
    }

    // 2. CF Workers (active ones with URL)
    try {
      var r2 = await fetch('/cloudflare/workers', {cache:'no-store'});
      var cfData = await r2.json();
      var workers = (cfData.result || []).filter(function(w) {
        return w.status === 'active' && w.worker_url;
      });
      if (workers.length) {
        var og2 = document.createElement('optgroup');
        og2.label = 'Cloudflare Workers';
        workers.forEach(function(w) {
          var id = 'cfworker:' + w.name;
          _endpoints.push({
            id: id, label: 'CF: ' + w.name, type: 'cfworker',
            url: w.worker_url, model: 'cfworker/' + w.name,
            cf_model: w.model, note: w.model,
          });
          var opt = document.createElement('option');
          opt.value = id; opt.textContent = 'CF Worker: ' + w.name;
          og2.appendChild(opt);
        });
        sel.appendChild(og2);
      }
    } catch(e) {}

    // 3. Modal deployments (active)
    try {
      var r3 = await fetch('/modal/deploy', {cache:'no-store'});
      var mData = await r3.json();
      var deps = (mData.deployments || []).filter(function(d) {
        return d.status === 'active' && d.url;
      });
      if (deps.length) {
        var og3 = document.createElement('optgroup');
        og3.label = 'Modal Deployments';
        deps.forEach(function(d) {
          var id = 'modal:' + d.deploy_id;
          _endpoints.push({
            id: id, label: 'Modal: ' + d.name, type: 'modal',
            url: d.url, model: d.model_id, vendor: 'modal',
            note: d.gpu + ' | ' + d.model_id,
          });
          var opt = document.createElement('option');
          opt.value = id; opt.textContent = 'Modal: ' + d.name + ' (' + d.model_id.split('/').pop() + ')';
          og3.appendChild(opt);
        });
        sel.appendChild(og3);
      }
    } catch(e) {}

    // 4. Registered Modal endpoints
    try {
      var r4 = await fetch('/modal/endpoints', {cache:'no-store'});
      var epData = await r4.json();
      var regEps = (Array.isArray(epData) ? epData : []).filter(function(e) { return e.url; });
      if (regEps.length) {
        var og4 = document.createElement('optgroup');
        og4.label = 'Modal Endpoints (registered)';
        regEps.forEach(function(e) {
          var id = 'modalep:' + e.name;
          _endpoints.push({
            id: id, label: 'Modal EP: ' + e.name, type: 'modal',
            url: e.url, model: (e.models||[])[0] || 'default',
            note: e.url,
          });
          var opt = document.createElement('option');
          opt.value = id; opt.textContent = 'Modal Endpoint: ' + e.name;
          og4.appendChild(opt);
        });
        sel.appendChild(og4);
      }
    } catch(e) {}

  } catch(e) {
    sel.innerHTML = '<option value="">Error loading endpoints</option>';
    return;
  }

  if (!sel.options.length) {
    sel.innerHTML = '<option value="">No active endpoints found</option>';
    return;
  }

  // Restore last selection
  var last = localStorage.getItem('pg-endpoint');
  if (last) {
    for (var i = 0; i < sel.options.length; i++) {
      if (sel.options[i].value === last) { sel.selectedIndex = i; break; }
    }
  }
  onEndpointChange();
}

function onEndpointChange() {
  var sel = document.getElementById('ep-select');
  var val = sel.value;
  localStorage.setItem('pg-endpoint', val);

  var ep = _endpoints.find(function(e) { return e.id === val; });
  var infoEl = document.getElementById('ep-info');
  var badgeEl = document.getElementById('ep-type-badge');
  var urlEl   = document.getElementById('ep-url-display');
  var siCard  = document.getElementById('system-info-card');
  var siBody  = document.getElementById('system-info-body');

  if (!ep) { infoEl.style.display = 'none'; siCard.style.display = 'none'; return; }
  infoEl.style.display = 'block';

  var typeLabel = {gateway:'Gateway', cfworker:'CF Worker', modal:'Modal', direct:'Direct'};
  badgeEl.innerHTML = '<span class="ep-badge ' + ep.type + '">' + (typeLabel[ep.type]||ep.type) + '</span>';
  urlEl.textContent = ep.url || ('Gateway /' + (ep.vendor||'') + ' provider');

  siCard.style.display = 'block';
  var lines = [];
  if (ep.model)    lines.push('<b>Model:</b> ' + escHtml(ep.model));
  if (ep.cf_model) lines.push('<b>CF Model:</b> ' + escHtml(ep.cf_model));
  if (ep.note)     lines.push('<b>Info:</b> ' + escHtml(ep.note));
  lines.push('<b>Route:</b> ' + (ep.url ? 'Direct HTTP' : 'Via Arbiter Gateway'));
  siBody.innerHTML = lines.join('<br>');
}

// ── Chat ──────────────────────────────────────────────────────────────────────
async function sendMessage() {
  if (_sending) return;
  var input   = document.getElementById('chat-input');
  var content = input.value.trim();
  if (!content) return;

  var sel = document.getElementById('ep-select');
  var ep  = _endpoints.find(function(e) { return e.id === sel.value; });
  if (!ep) { showToast('Select an endpoint first', 'error'); return; }

  _sending = true;
  document.getElementById('send-btn').disabled = true;
  input.value = '';
  autoResize(input);

  // Add user message
  _messages.push({role:'user', content:content});
  renderMessages();
  appendThinking();

  var systemPrompt = document.getElementById('system-prompt').value.trim();
  var temperature  = parseFloat(document.getElementById('temperature').value);
  var maxTokens    = parseInt(document.getElementById('max-tokens').value, 10);

  var msgs = [];
  if (systemPrompt) msgs.push({role:'system', content:systemPrompt});
  msgs = msgs.concat(_messages);

  var t0 = performance.now();
  try {
    var result = await _callEndpoint(ep, msgs, temperature, maxTokens);
    var latency = Math.round(performance.now() - t0);
    removeThinking();
    _messages.push({role:'assistant', content: result.text});
    renderMessages(result.text, latency, result.model);
  } catch(err) {
    removeThinking();
    var errMsg = '⚠️ Error: ' + (err.message || String(err));
    _messages.push({role:'assistant', content: errMsg});
    renderMessages(errMsg, null, null);
    showToast(err.message || String(err), 'error');
  }

  _sending = false;
  document.getElementById('send-btn').disabled = false;
  input.focus();
}

async function _callEndpoint(ep, messages, temperature, maxTokens) {
  var payload = { messages: messages, temperature: temperature, max_tokens: maxTokens };

  if (ep.type === 'cfworker') {
    // Route via gateway using cfworker/ model prefix
    payload.model = ep.model;
    var r = await fetch('/v1/chat/completions', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify(payload),
    });
    if (!r.ok) {
      var errData = await r.json().catch(function() { return {detail: r.statusText}; });
      throw new Error(errData.detail || r.statusText);
    }
    var data = await r.json();
    return {
      text:  data.choices[0].message.content,
      model: data.model || ep.model,
    };

  } else if (ep.type === 'modal' && ep.url) {
    // Call Modal endpoint directly
    var r = await fetch(ep.url.replace(/\/$/, '') + '/v1/chat/completions', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify(Object.assign({}, payload, {model: ep.model})),
    });
    if (!r.ok) {
      var errData = await r.json().catch(function() { return {detail: r.statusText}; });
      throw new Error('Modal: ' + (errData.detail || errData.error || r.statusText));
    }
    var data = await r.json();
    return {
      text:  data.choices[0].message.content,
      model: data.model || ep.model,
    };

  } else {
    // Gateway routing (standard providers + modal via gateway)
    payload.model = ep.model;
    var qs = ep.vendor ? '?vendor=' + encodeURIComponent(ep.vendor) : '';
    var r = await fetch('/v1/chat/completions' + qs, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify(payload),
    });
    if (!r.ok) {
      var errData = await r.json().catch(function() { return {detail: r.statusText}; });
      throw new Error(errData.detail || r.statusText);
    }
    var data = await r.json();
    return {
      text:  data.choices[0].message.content,
      model: data.model || ep.model,
    };
  }
}

// ── Render ────────────────────────────────────────────────────────────────────
function renderMessages(lastAssistantText, latencyMs, modelUsed) {
  var container = document.getElementById('chat-messages');
  var empty     = document.getElementById('chat-empty');

  if (_messages.length === 0) {
    empty.style.display = 'flex';
    container.querySelectorAll('.chat-msg').forEach(function(el) { el.remove(); });
    return;
  }
  empty.style.display = 'none';

  // Rebuild all messages
  container.querySelectorAll('.chat-msg, .msg-detail').forEach(function(el) { el.remove(); });

  _messages.forEach(function(msg, idx) {
    var isUser = msg.role === 'user';
    var isLast = idx === _messages.length - 1;
    var div = document.createElement('div');
    div.className = 'chat-msg ' + msg.role;

    var avatar = isUser
      ? '<div class="msg-avatar user-av">U</div>'
      : '<div class="msg-avatar ai-av">🤖</div>';

    var metaHtml = '';
    if (!isUser && isLast && latencyMs != null) {
      metaHtml = '<div class="msg-meta">' +
        (modelUsed ? escHtml(modelUsed) + ' ' : '') +
        '<span class="latency-badge">' + latencyMs + 'ms</span></div>';
    }

    div.innerHTML = avatar +
      '<div><div class="msg-bubble">' + escHtml(msg.content) + '</div>' + metaHtml + '</div>';
    container.appendChild(div);
  });

  container.scrollTop = container.scrollHeight;
}

function appendThinking() {
  var container = document.getElementById('chat-messages');
  var div = document.createElement('div');
  div.className = 'chat-msg assistant';
  div.id = 'thinking-msg';
  div.innerHTML = '<div class="msg-avatar ai-av">🤖</div><div class="msg-bubble"><div class="thinking-dots"><span></span><span></span><span></span></div></div>';
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

function removeThinking() {
  var el = document.getElementById('thinking-msg');
  if (el) el.remove();
}

function clearChat() {
  _messages = [];
  renderMessages();
  document.getElementById('chat-empty').style.display = 'flex';
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 140) + 'px';
}

function escHtml(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/\n/g,'<br>');
}

// ── Init ──────────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', function() {
  loadEndpoints();
});
</script>
