<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Logs — Arbiter</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/arbiter.css" />
  <script src="/static/arbiter.js"></script>
  <style>
    /* ── Log viewer specific styles ─────────────────────────── */
    .log-toolbar {
      display: flex; flex-wrap: wrap; gap: 10px;
      align-items: center; padding: 12px 0 14px;
    }
    .log-toolbar .toolbar-group {
      display: flex; align-items: center; gap: 6px;
    }
    .log-toolbar label { font-size: 12px; color: var(--text-3); white-space: nowrap; }
    .log-toolbar input[type=text], .log-toolbar select {
      font-size: 12px; padding: 4px 8px; border-radius: 6px;
      border: 1px solid var(--border); background: var(--surface-2);
      color: var(--text); outline: none; height: 30px;
    }
    .log-toolbar input[type=text]:focus, .log-toolbar select:focus {
      border-color: var(--accent);
    }
    .log-toolbar input[type=text] { width: 180px; }
    .log-toolbar .btn-xs {
      padding: 4px 10px; font-size: 11px; height: 30px;
      border-radius: 6px; border: 1px solid var(--border);
      background: var(--surface-2); color: var(--text-2);
      cursor: pointer; display: flex; align-items: center; gap: 4px;
    }
    .log-toolbar .btn-xs:hover { background: var(--surface-3); color: var(--text); }
    .log-toolbar .btn-xs.active { background: var(--accent); color: #fff; border-color: var(--accent); }

    /* level checkboxes */
    .level-pills { display: flex; gap: 4px; }
    .level-pill {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 3px 8px; border-radius: 12px; font-size: 11px;
      font-weight: 600; cursor: pointer; user-select: none;
      border: 1px solid transparent;
      transition: opacity .15s;
    }
    .level-pill input { display: none; }
    .level-pill:not(.checked) { opacity: .38; }
    .level-pill.checked { opacity: 1; }
    .level-pill[data-l="DEBUG"]    { background: rgba(139,148,158,.15); border-color: rgba(139,148,158,.4); color: #8b949e; }
    .level-pill[data-l="INFO"]     { background: rgba(58,163,242,.12); border-color: rgba(58,163,242,.4); color: #3aa3f2; }
    .level-pill[data-l="WARNING"]  { background: rgba(240,185,11,.12); border-color: rgba(240,185,11,.4); color: #d4a017; }
    .level-pill[data-l="ERROR"]    { background: rgba(248,81,73,.12); border-color: rgba(248,81,73,.4); color: #f85149; }
    .level-pill[data-l="CRITICAL"] { background: rgba(188,40,237,.12); border-color: rgba(188,40,237,.4); color: #bc28ed; }

    /* log table */
    .log-table-wrap {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; overflow: hidden;
    }
    .log-stats-bar {
      display: flex; align-items: center; gap: 16px;
      padding: 8px 14px; font-size: 11px; color: var(--text-3);
      background: var(--surface-2); border-bottom: 1px solid var(--border);
    }
    .log-stats-bar strong { color: var(--text-2); }
    .log-count-badge {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 1px 6px; border-radius: 8px; font-size: 10px; font-weight: 600;
    }
    .log-count-badge.DEBUG    { background: rgba(139,148,158,.15); color: #8b949e; }
    .log-count-badge.INFO     { background: rgba(58,163,242,.12); color: #3aa3f2; }
    .log-count-badge.WARNING  { background: rgba(240,185,11,.12); color: #d4a017; }
    .log-count-badge.ERROR    { background: rgba(248,81,73,.12); color: #f85149; }
    .log-count-badge.CRITICAL { background: rgba(188,40,237,.12); color: #bc28ed; }

    .log-entries { font-family: 'JetBrains Mono', monospace; font-size: 11.5px; }
    .log-row {
      display: grid;
      grid-template-columns: 170px 70px 200px 1fr;
      gap: 0; padding: 3px 0;
      border-bottom: 1px solid var(--border);
      line-height: 1.6;
    }
    .log-row:last-child { border-bottom: none; }
    .log-row:hover { background: var(--surface-2); }
    .log-row.expanded { background: var(--surface-2); }
    .log-row > div { padding: 2px 10px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .log-row .log-ts { color: var(--text-3); font-size: 10.5px; }
    .log-row .log-level { font-weight: 700; font-size: 10px; text-align: center; }
    .log-row .log-logger { color: var(--text-3); font-size: 10.5px; }
    .log-row .log-msg { color: var(--text); }
    .log-row .log-level.DEBUG    { color: #8b949e; }
    .log-row .log-level.INFO     { color: #3aa3f2; }
    .log-row .log-level.WARNING  { color: #d4a017; }
    .log-row .log-level.ERROR    { color: #f85149; }
    .log-row .log-level.CRITICAL { color: #bc28ed; }
    .log-row.level-ERROR, .log-row.level-CRITICAL { background: rgba(248,81,73,.04); }

    /* expanded detail */
    .log-detail {
      display: none; padding: 8px 14px; background: var(--surface-2);
      border-bottom: 1px solid var(--border);
      font-family: 'JetBrains Mono', monospace; font-size: 11px;
      white-space: pre-wrap; word-break: break-all;
      color: var(--text-2);
    }
    .log-row.expanded + .log-detail { display: block; }

    .log-empty { text-align: center; padding: 48px; color: var(--text-3); font-size: 13px; }

    /* tail indicator */
    .tail-dot { width: 7px; height: 7px; border-radius: 50%; background: #3aa3f2; display: inline-block; }
    .tail-dot.active { animation: pulse 1.2s ease-in-out infinite; background: #2da44e; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

    /* header row */
    .log-header {
      display: grid;
      grid-template-columns: 170px 70px 200px 1fr;
      gap: 0; padding: 6px 0;
      background: var(--surface-2); border-bottom: 1px solid var(--border);
      font-size: 10px; font-weight: 600; text-transform: uppercase;
      color: var(--text-muted); letter-spacing: .04em;
    }
    .log-header > div { padding: 2px 10px; color: var(--text-3); }

    /* responsive: hide logger column on narrow */
    @media (max-width: 900px) {
      .log-row { grid-template-columns: 130px 60px 1fr; }
      .log-row .log-logger, .log-header .h-logger { display: none; }
      .log-header { grid-template-columns: 130px 60px 1fr; }
    }
  </style>
</head>

  <!-- Main content -->
  <div class="main-wrapper">
    <!-- Topbar -->

            <label class="level-pill checked" data-l="INFO">

            <label class="level-pill checked" data-l="WARNING">

        <!-- Logger -->

        </div>

<script>
'use strict';
// ─── state ────────────────────────────────────────────────────────────────────
var _autoTimer    = null;
var _tailLive     = true;
var _lastRecords  = [];
var _debounceT    = null;
var _expandedSeqs = new Set();   // seqs of expanded rows (survives refresh)

// levels currently active (all on by default)
var _activeLevels = new Set(['DEBUG','INFO','WARNING','ERROR','CRITICAL']);

function toggleLevel(cb) {
  var pill = cb.closest('.level-pill');
  if (cb.checked) { _activeLevels.add(cb.value); pill.classList.add('checked'); }
  else             { _activeLevels.delete(cb.value); pill.classList.remove('checked'); }
  refresh();
}

function debounceRefresh() {
  clearTimeout(_debounceT);
  _debounceT = setTimeout(refresh, 300);
}

// ─── fetch & render ───────────────────────────────────────────────────────────
async function refresh() {
  var params = new URLSearchParams();
  // Find lowest active level (send it as minimum; we filter client-side for the rest)
  // Actually send 'DEBUG' always; filter by _activeLevels on client side for flexibility
  params.set('level', 'DEBUG');
  var loggerVal = document.getElementById('filter-logger').value;
  if (loggerVal) params.set('logger_name', loggerVal);
  var q = document.getElementById('filter-q').value.trim();
  if (q) params.set('q', q);
  var tail = parseInt(document.getElementById('filter-tail').value || '0', 10);
  if (tail > 0) params.set('tail', tail);
  var limit = document.getElementById('filter-limit').value;
  params.set('limit', limit);
  var sort = document.getElementById('filter-sort').value;
  params.set('newest_first', sort === 'newest' ? 'true' : 'false');

  try {
    var r = await fetch('/logs/records?' + params.toString(), {cache:'no-store'});
    if (!r.ok) throw new Error(r.statusText);
    var data = await r.json();
    _lastRecords = data.records || [];
    renderRecords(_lastRecords, data.total_buffered, data.returned);
    updateLoggers();
    document.getElementById('stat-refresh-ts').textContent = 'Updated ' + new Date().toLocaleTimeString();
    if (_tailLive && sort === 'oldest') {
      var wrap = document.getElementById('log-table-wrap');
      wrap.scrollTop = wrap.scrollHeight;
    }
  } catch(e) {
    document.getElementById('log-entries').innerHTML =
      '<div class="log-empty" style="color:var(--danger)">Error fetching logs: ' + e.message + '</div>';
  }
}

function renderRecords(records, total, returned) {
  // Client-side level filter
  var filtered = records.filter(function(r) { return _activeLevels.has(r.level); });

  // Stats bar
  document.getElementById('log-stats').style.display = 'flex';
  document.getElementById('stat-total').textContent = total;
  document.getElementById('stat-shown').textContent = filtered.length;

  // Level counts in filtered set
  var counts = {};
  filtered.forEach(function(r) { counts[r.level] = (counts[r.level]||0) + 1; });
  var badges = Object.entries(counts).map(function(e) {
    return '<span class="log-count-badge ' + e[0] + '">' + e[0] + ' ' + e[1] + '</span>';
  }).join(' ');
  document.getElementById('level-counts').innerHTML = badges;

  if (!filtered.length) {
    document.getElementById('log-entries').innerHTML = '<div class="log-empty">No log records match the current filters.</div>';
    return;
  }

  var html = filtered.map(function(r, idx) {
    var ts  = r.ts_iso.replace('T', ' ').replace('Z','');
    var msg = escHtml(r.message);
    var detail = escHtml(JSON.stringify(r, null, 2));
    var seq = r.seq != null ? String(r.seq) : String(idx);
    var expanded = _expandedSeqs.has(seq) ? ' expanded' : '';
    return (
      '<div class="log-row level-' + r.level + expanded + '" onclick="toggleDetail(this,\'' + seq + '\')" id="row-' + idx + '" data-seq="' + seq + '">' +
        '<div class="log-ts">' + ts + '</div>' +
        '<div class="log-level ' + r.level + '">' + r.level + '</div>' +
        '<div class="log-logger" title="' + escHtml(r.logger) + '">' + escHtml(shortenLogger(r.logger)) + '</div>' +
        '<div class="log-msg">' + msg + '</div>' +
      '</div>' +
      '<div class="log-detail" id="detail-' + idx + '">' + detail + '</div>'
    );
  }).join('');

  document.getElementById('log-entries').innerHTML = html;
}

function toggleDetail(rowEl, seq) {
  rowEl.classList.toggle('expanded');
  if (rowEl.classList.contains('expanded')) {
    _expandedSeqs.add(seq);
  } else {
    _expandedSeqs.delete(seq);
  }
}

function shortenLogger(name) {
  // app.api.cloudflare_manager → a.a.cloudflare_manager
  var parts = name.split('.');
  if (parts.length <= 2) return name;
  return parts.slice(0, -1).map(function(p) { return p[0]; }).join('.') + '.' + parts[parts.length-1];
}

function escHtml(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

// ─── logger dropdown ──────────────────────────────────────────────────────────
async function updateLoggers() {
  try {
    var r = await fetch('/logs/loggers', {cache:'no-store'});
    var data = await r.json();
    var sel = document.getElementById('filter-logger');
    var cur = sel.value;
    // rebuild
    sel.innerHTML = '<option value="">All loggers</option>';
    (data.loggers || []).forEach(function(l) {
      var opt = document.createElement('option');
      opt.value = l; opt.textContent = l;
      if (l === cur) opt.selected = true;
      sel.appendChild(opt);
    });
  } catch(e) {}
}

// ─── auto-refresh ─────────────────────────────────────────────────────────────
function setAutoRefresh() {
  clearInterval(_autoTimer);
  var ms = parseInt(document.getElementById('autorefresh-interval').value, 10);
  if (ms > 0) {
    _autoTimer = setInterval(refresh, ms);
    document.getElementById('tail-dot').classList.add('active');
  } else {
    document.getElementById('tail-dot').classList.remove('active');
  }
}

function toggleTailLive() {
  _tailLive = !_tailLive;
  var btn = document.getElementById('btn-tail-live');
  var dot = document.getElementById('tail-dot');
  btn.classList.toggle('active', _tailLive);
  dot.classList.toggle('active', _tailLive);
}

// ─── clear ────────────────────────────────────────────────────────────────────
async function clearLogs() {
  if (!confirm('Clear all in-memory log records?')) return;
  await fetch('/logs/clear', {method:'DELETE'});
  await refresh();
  toast('Log buffer cleared', 'success');
}

// ─── download / copy ─────────────────────────────────────────────────────────
function logsAsText() {
  return _lastRecords
    .filter(function(r) { return _activeLevels.has(r.level); })
    .map(function(r) {
      return r.ts_iso.replace('T',' ').replace('Z','') + ' [' + r.level + '] ' + r.logger + ': ' + r.message;
    }).join('\n');
}

function downloadLogs() {
  var text = logsAsText();
  var blob = new Blob([text], {type:'text/plain'});
  var url  = URL.createObjectURL(blob);
  var a    = document.createElement('a');
  a.href = url;
  a.download = 'arbiter-logs-' + new Date().toISOString().slice(0,19).replace(/:/g,'-') + '.txt';
  a.click();
  URL.revokeObjectURL(url);
}

function copyLogs() {
  navigator.clipboard.writeText(logsAsText()).then(function() {
    toast('Logs copied to clipboard', 'success');
  }).catch(function() {
    toast('Copy failed — try Download instead', 'error');
  });
}

// ─── init ─────────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', function() {
  refresh();
  setAutoRefresh();  // start with 5s default
});
</script>
</body>
</html>
