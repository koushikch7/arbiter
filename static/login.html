<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — Arbiter</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/arbiter.css" />
  <script src="/static/arbiter.js"></script>
  <style>
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: var(--bg-1); }
    .login-card {
      background: var(--surface-1);
      border: 1px solid var(--border-1);
      border-radius: 16px;
      padding: 48px 40px;
      width: 100%;
      max-width: 380px;
      text-align: center;
      box-shadow: 0 4px 32px rgba(0,0,0,0.12);
    }
    .login-logo {
      width: 56px; height: 56px;
      background: linear-gradient(135deg, var(--accent), #7c3aed);
      border-radius: 14px;
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 28px; font-weight: 700; color: #fff;
      margin-bottom: 20px;
    }
    .login-title { font-size: 22px; font-weight: 700; color: var(--text-1); margin-bottom: 4px; }
    .login-sub   { font-size: 13px; color: var(--text-3); margin-bottom: 32px; }
    .google-btn {
      display: flex; align-items: center; justify-content: center; gap: 10px;
      width: 100%; padding: 12px 20px;
      background: var(--bg-1); border: 1.5px solid var(--border-1);
      border-radius: 10px; cursor: pointer;
      font-size: 14px; font-weight: 500; color: var(--text-1);
      text-decoration: none;
      transition: background 0.15s, border-color 0.15s, transform 0.1s;
    }
    .google-btn:hover { background: var(--surface-2); border-color: var(--accent); transform: translateY(-1px); }
    .google-btn:active { transform: translateY(0); }
    .google-icon { width: 20px; height: 20px; flex-shrink: 0; }
    .error-banner {
      display: none;
      background: rgba(239,68,68,0.12); border: 1px solid rgba(239,68,68,0.3);
      border-radius: 8px; padding: 10px 14px;
      font-size: 13px; color: var(--red); margin-bottom: 20px;
    }
    .error-banner.show { display: block; }
    .login-footer { margin-top: 24px; font-size: 12px; color: var(--text-3); }
  </style>
</head>
<body>
<div class="login-card">
  <div class="login-logo">A</div>
  <div class="login-title">Arbiter</div>
  <div class="login-sub">LLM Traffic Controller</div>

  <div class="error-banner" id="error-banner"></div>

  <a class="google-btn" href="/auth/login">
    <svg class="google-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
      <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
      <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
      <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
    </svg>
    Continue with Google
  </a>

  <div class="login-footer">Sign in to access the Arbiter dashboard</div>
</div>

<script>
  // Show error from URL param
  const params = new URLSearchParams(window.location.search);
  const err = params.get('error');
  if (err) {
    const msgs = {
      not_allowed:          'Your account is not authorized to access this system.',
      token_exchange_failed:'Authentication failed. Please try again.',
      invalid_state:        'Session expired. Please try again.',
      no_email:             'Could not retrieve your email from Google.',
      server_error:         'A server error occurred. Please try again.',
    };
    const banner = document.getElementById('error-banner');
    banner.textContent = msgs[err] || `Login error: ${err}`;
    banner.classList.add('show');
  }

  // If already logged in, redirect to dashboard
  fetch('/auth/me').then(r => r.json()).then(d => {
    if (d.authenticated) window.location.replace('/dashboard');
  }).catch(() => {});
</script>
</body>
</html>
