services:
  gateway:
    build: .
    ports:
      - "8080:8000"
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./app:/app/app
      - ./static:/app/static
      - ./data:/app/data           # persistent state: users, custom providers, model toggles
      - ./.env:/app/.env           # so the keys-management UI can read/write provider keys at runtime
    restart: unless-stopped
    environment:
      # Override REDIS_URL to use the compose service name regardless of .env
      - REDIS_URL=redis://redis:6379
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  redis:
    image: redis:7-alpine
    # No host port binding — Redis is internal only, accessed via Docker network
    expose:
      - "6379"
    command: redis-server --appendonly yes --appendfsync everysec --maxmemory 512mb --maxmemory-policy volatile-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  redis_data:
